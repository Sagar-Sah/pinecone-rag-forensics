<div class="chunk-card">
  <div class="chunk-topline">
    <div>
      <h3>{{ loop.index }}. {{ match.metadata.title }}</h3>

      <p class="muted">
        {{ match.metadata.source_file }}
        · chunk {{ match.metadata.chunk_index }}
        · page {{ match.metadata.page_number or 'N/A' }}
      </p>
    </div>

    <div class="score">
      {{ "%.4f"|format(match.score) }}
    </div>
  </div>

  <div class="metadata-row">
    <span class="pill">{{ match.metadata.category }}</span>
    <span class="pill">{{ match.metadata.doc_id }}</span>
  </div>

  <pre>{{ match.metadata.text }}</pre>
</div>
