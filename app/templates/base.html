<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Pinecone RAG Forensics Lab{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">
      <span class="brand-mark">&#9632;</span> RAG Forensics Lab
    </a>
    <nav>
      {% if current_user is defined and current_user %}
      <a href="/">Dashboard</a>
      <a href="/upload">Upload</a>
      <a href="/ask">Ask</a>
      <a href="/eval">Eval</a>
      <span class="muted" style="font-size:13px">{{ current_user.username }}</span>
      <a href="/logout" style="color:var(--danger)">Logout</a>
      {% else %}
      <a href="/login">Login</a>
      <a href="/register">Register</a>
      {% endif %}
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
