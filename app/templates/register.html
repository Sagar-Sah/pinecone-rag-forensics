{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div style="max-width:460px;margin:80px auto">
  <div class="panel">
    <p class="eyebrow">Get started</p>
    <h2 style="margin-top:4px;margin-bottom:20px">Create your account</h2>

    {% if errors %}
    <div class="alert alert-error">
      {% for e in errors %}<div>{{ e }}</div>{% endfor %}
    </div>
    {% endif %}

    <form method="post">
      <div class="form-stack">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               value="{{ username or '' }}" required autofocus
               minlength="3" maxlength="80" />
      </div>
      <div class="form-stack">
        <label for="email">Email</label>
        <input type="email" id="email" name="email"
               value="{{ email or '' }}" required />
      </div>
      <div class="form-stack">
        <label for="password">Password <span class="muted">(min 8 chars)</span></label>
        <input type="password" id="password" name="password" required minlength="8" />
      </div>
      <div class="form-stack">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" required />
      </div>
      <button type="submit" style="width:100%">Create Account</button>
    </form>

    <p style="margin-top:18px;text-align:center" class="muted">
      Already have an account? <a href="/login" style="color:var(--text);font-weight:700">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
